<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

  <!-- SEO Meta Tags -->
  <title>Pathway Analytics - Healthcare Economics Documentation</title>
  <meta name="description" content="Documentation and resources for Pathway Analytics healthcare economics services, including the Sexual Health Tariff Grouper.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://docs.pathwayanalytics.com">

  <!-- Open Graph -->
  <meta property="og:title" content="Pathway Analytics - Healthcare Economics Documentation">
  <meta property="og:description" content="Documentation and resources for Pathway Analytics healthcare economics services, including the Sexual Health Tariff Grouper.">
  <meta property="og:image" content="https://mta-sts.pathwayanalytics.com/logo/Pathway%20Analytics%20Logo%20small.png">
  <meta property="og:url" content="https://docs.pathwayanalytics.com">
  <meta property="og:type" content="website">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Pathway Analytics",
    "url": "https://docs.pathwayanalytics.com",
    "logo": "https://mta-sts.pathwayanalytics.com/logo/Pathway%20Analytics%20Logo%20small.png",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "email": "enquiries@pathwayanalytics.com"
    }
  }
  </script>

  <!-- Favicon and Icons -->
  <link rel="icon" type="image/x-icon" href="https://mta-sts.pathwayanalytics.com/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="https://mta-sts.pathwayanalytics.com/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://mta-sts.pathwayanalytics.com/icons/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://mta-sts.pathwayanalytics.com/icons/android-chrome-512x512.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/custom.css">

  <!-- Inline theme detection to prevent flash of wrong theme (FOUC prevention) -->
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('pa-theme-preference');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <!-- Skip Navigation Link -->
  <a href="#app" class="skip-link">Skip to main content</a>

  <div id="app" role="main" aria-label="Documentation content">Loading&hellip;</div>

  <noscript>
    <p>This documentation site requires JavaScript to function. Please enable JavaScript in your browser settings to view the content.</p>
  </noscript>

  <!-- Docsify Configuration -->
  <script>
    window.$docsify = {
      name: '<img src="https://mta-sts.pathwayanalytics.com/logo/Pathway%20Analytics%20Logo%20small.png" alt="Pathway Analytics" style="height:36px;width:auto;">',
      nameLink: '/',
      loadSidebar: true,
      loadNavbar: '_navbar.md',
      mergeNavbar: true,
      routerMode: 'hash',
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 4,
      search: {
        placeholder: 'Type to search',
        noData: 'No matches found.',
        depth: 4,
        pathNamespaces: ['/sexual-health-tariff', '/case-studies', '/health-pathways', '/ftci', '/style-guide']
      },
      formatUpdated: '{DD}/{MM}/{YYYY}',
      notFoundPage: true
    };
  </script>

  <!-- Custom Plugins -->
  <script>
    // Sidebar Toggle Plugin
    // Monitors route changes and toggles sidebar visibility based on section
    function sidebarTogglePlugin(hook, vm) {
      hook.doneEach(function () {
        var path = vm.route.path;
        var isTariffSection = path.startsWith('/sexual-health-tariff');
        document.body.classList.toggle('has-sidebar', isTariffSection);
        document.body.classList.toggle('full-width', !isTariffSection);

        // Ensure ARIA labels on sidebar toggle elements
        var sidebarToggle = document.querySelector('.sidebar-toggle');
        if (sidebarToggle && !sidebarToggle.getAttribute('aria-label')) {
          sidebarToggle.setAttribute('aria-label', 'Toggle sidebar navigation');
          sidebarToggle.setAttribute('role', 'button');
        }

        // Add ARIA landmark to sidebar navigation
        var sidebar = document.querySelector('.sidebar');
        if (sidebar && !sidebar.getAttribute('role')) {
          sidebar.setAttribute('role', 'navigation');
          sidebar.setAttribute('aria-label', 'Documentation sidebar');
        }
      });
    }

    // Dark Mode Plugin
    // Manages dark mode toggle, localStorage persistence, and OS preference detection
    function darkModePlugin(hook, vm) {
      var STORAGE_KEY = 'pa-theme-preference';
      var LOGO_LIGHT = 'https://mta-sts.pathwayanalytics.com/logo/Pathway%20Analytics%20Logo%20small.png';
      var LOGO_DARK = 'https://mta-sts.pathwayanalytics.com/logo/Pathway%20Analytics%20Logo%20small%20white.png';

      function getStoredPreference() {
        try {
          return localStorage.getItem(STORAGE_KEY);
        } catch (e) {
          return null;
        }
      }

      function setStoredPreference(theme) {
        try {
          localStorage.setItem(STORAGE_KEY, theme);
        } catch (e) {
          // localStorage unavailable, silently ignore
        }
      }

      function getPreferredTheme() {
        var stored = getStoredPreference();
        if (stored === 'dark' || stored === 'light') return stored;
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
        return 'light';
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        // Swap logo sources throughout the page
        var logos = document.querySelectorAll('.app-nav img, .app-name img, .sidebar .app-name-link img');
        logos.forEach(function (logo) {
          if (logo.src.indexOf('pathwayanalytics.com') !== -1) {
            logo.src = theme === 'dark' ? LOGO_DARK : LOGO_LIGHT;
          }
        });
        // Update toggle button
        var toggleBtn = document.getElementById('dark-mode-toggle');
        if (toggleBtn) {
          toggleBtn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
          toggleBtn.innerHTML = theme === 'dark'
            ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        }
      }

      hook.mounted(function () {
        // Create dark mode toggle button
        var toggleBtn = document.createElement('button');
        toggleBtn.id = 'dark-mode-toggle';
        toggleBtn.className = 'dark-mode-toggle';
        toggleBtn.type = 'button';

        var currentTheme = getPreferredTheme();
        toggleBtn.innerHTML = currentTheme === 'dark'
          ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        toggleBtn.setAttribute('aria-label', currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');

        toggleBtn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var newTheme = current === 'dark' ? 'light' : 'dark';
          applyTheme(newTheme);
          setStoredPreference(newTheme);
        });

        // Insert toggle into the navbar area
        var nav = document.querySelector('.app-nav');
        if (nav) {
          nav.appendChild(toggleBtn);
        } else {
          // Retry after Docsify renders the nav
          var observer = new MutationObserver(function (mutations, obs) {
            var navEl = document.querySelector('.app-nav');
            if (navEl) {
              navEl.appendChild(toggleBtn);
              obs.disconnect();
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        // Apply initial theme
        applyTheme(currentTheme);
      });
    }

    // Edit Link Plugin
    // Appends a "Suggest an edit" link pointing to the GitHub source file
    function editLinkPlugin(hook, vm) {
      hook.afterEach(function (html) {
        var filepath = vm.route.file;
        if (!filepath) return html;
        var editUrl = 'https://github.com/Pathway-Analytics/docs/edit/main/' + filepath;
        var editHtml = '<div class="edit-link">' +
          '<a href="' + editUrl + '" target="_blank" rel="noopener">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
          '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>' +
          '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' +
          '</svg> Suggest an edit</a></div>';
        return html + editHtml;
      });
    }

    // Collapsible Sidebar Plugin
    // Makes sidebar section groups (Executive, Commissioner, Provider) collapsible
    // All groups are collapsed by default; clicking a group heading toggles it
    function collapsibleSidebarPlugin(hook, vm) {
      hook.doneEach(function () {
        var sidebarNav = document.querySelector('.sidebar-nav');
        if (!sidebarNav) return;

        // Find all top-level list items that contain a <strong> or <p> (group headings)
        var topItems = sidebarNav.querySelectorAll(':scope > ul > li');
        topItems.forEach(function (li) {
          var heading = li.querySelector(':scope > p') || li.querySelector(':scope > strong');
          var subList = li.querySelector(':scope > ul');
          if (!heading || !subList) return;
          if (li.classList.contains('collapsible-initialized')) return;

          li.classList.add('collapsible-initialized');
          li.classList.add('collapsible');

          // Check if current page is within this group
          var links = subList.querySelectorAll('a');
          var currentPath = vm.route.path;
          var isActiveGroup = false;
          links.forEach(function (link) {
            var href = link.getAttribute('href') || '';
            if (href && currentPath.indexOf(href.replace(/^\//, '').replace(/\/$/, '')) !== -1) {
              isActiveGroup = true;
            }
          });

          // Collapse by default unless the active page is in this group
          if (!isActiveGroup) {
            li.classList.add('collapsed');
          } else {
            li.classList.remove('collapsed');
          }

          // Make heading clickable
          heading.style.cursor = 'pointer';
          heading.setAttribute('role', 'button');
          heading.setAttribute('aria-expanded', !li.classList.contains('collapsed'));

          heading.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            li.classList.toggle('collapsed');
            heading.setAttribute('aria-expanded', !li.classList.contains('collapsed'));
          });
        });
      });
    }

    // Register all custom plugins
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      sidebarTogglePlugin,
      collapsibleSidebarPlugin,
      darkModePlugin,
      editLinkPlugin
    ]);
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Docsify Plugins (async to avoid blocking render) -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2" async></script>
</body>

</html>
